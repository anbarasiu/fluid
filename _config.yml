site: Fluid
title: Fluid - Tech Thoughts
tagline: Software engineering insights, web development explorations, and technology essays
description: Technical writing and software engineering insights. Covering web development, programming concepts, technology trends, startups, philosophy, and innovative approaches to building digital products.
googlewebfonts: Fira+Code:wght@400;500;700
lang: en-US
timezone: Calcutta
data-theme: light # default theme "dark" | "light"
google_analytics: true

author:
  name: Anbarasi U
  email: hi@anbuu.in
  twitter: anbarasiu

# Social media and SEO
social:
  name: Fluid
  links:
    - https://fluid.anbuu.in

twitter:
  username: anbarasiu
  card: summary_large_image

# SEO keywords
keywords: software engineering, web development, tech blog, programming, technology essays, startup insights, philosophy

# Default images for social sharing
defaults_image: /assets/img/fluid-og.jpg
logo: /favicon.ico

# URL settings
url: "https://fluid.anbuu.in" #
baseurl: "https://fluid.anbuu.in" # used in meta tag
permalink: "https://fluid.anbuu.in/"
permalink: pretty 


markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge


exclude:
  - .jekyll-cache
  - .obsidian
  - Gemfile
  - Gemfile.lock
  - LICENSE.md
  - README.md
  - CONTRIBUTING.md
  
compress_html:
  clippings: all
  comments: ["<!-- ", " -->"]

sass:
  sass_dir: _sass
  style: compressed

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-relative-links
  - jekyll-seo-tag

collections:
  pages:
    output: true
    permalink: /:name
  posts:
    output: true
    permalink: /:year/:month/:day/:slug
  
defaults:
  -
    scope:
      path: ""
    values:
      layout: "default"
  -
    scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

relative_links:
  enabled:     true
  collections: false


